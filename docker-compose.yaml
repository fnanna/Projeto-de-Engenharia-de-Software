services:
  # FRONT-END (JavaScript/HTML/CSS servido via Nginx)
  frontend:
    image: nginx:alpine
    container_name: pes_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - db
    networks:
      - pes_network

  # BANCO DE DADOS (MySQL)
  db:
    image: mysql:8.0
    container_name: pes_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pes_db
      MYSQL_USER: pes_user
      MYSQL_PASSWORD: pes_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pes_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BACKEND (Python)
  backend:
    build: ./backend
    container_name: pes_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: pes_db
      DB_USER: pes_user
      DB_PASSWORD: pes_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pes_network

volumes:
  db_data:

networks:
  pes_network:
    driver: bridge
